<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 수정</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
      min-height: 100vh;
    }

    .form-wrap {
      max-width: 760px;
      margin: 70px auto;
      background: rgba(255,255,255,0.94);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 45px rgba(31, 41, 55, 0.08);
    }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .page-desc {
      color: #64748b;
      margin-bottom: 28px;
    }

    .form-label {
      font-weight: 700;
      color: #334155;
    }

    .form-control {
      border-radius: 14px;
      padding: 14px 16px;
    }

    textarea.form-control {
      min-height: 220px;
      resize: vertical;
    }

    .btn {
      border-radius: 14px;
      padding: 12px 20px;
      font-weight: 700;
    }

    .primary-btn {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      border: none;
      color: white;
    }

    .outline-btn {
      border: 1px solid #cbd5e1;
      background: white;
      color: #1e293b;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="form-wrap">
    <div class="page-title">게시글 수정</div>
    <div class="page-desc">제목과 내용을 수정할 수 있습니다.</div>

    <form th:action="@{/boards/{id}/edit(id=${board.id})}" method="post">
      <div class="mb-3">
        <label class="form-label">작성자</label>
        <input type="text" class="form-control" th:value="${board.user.name}" readonly>
      </div>

      <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control" th:value="${board.title}" required>
      </div>

      <div class="mb-4">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" required th:text="${board.content}"></textarea>
      </div>

      <div class="d-flex justify-content-between gap-2">
        <a th:href="@{/boards/{id}(id=${board.id})}" class="btn outline-btn">취소</a>
        <button type="submit" class="btn primary-btn">수정 완료</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
