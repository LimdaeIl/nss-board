<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 작성</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
      min-height: 100vh;
    }

    .form-wrap {
      max-width: 760px;
      margin: 70px auto;
      background: rgba(255,255,255,0.94);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 20px 45px rgba(31, 41, 55, 0.08);
    }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .page-desc {
      color: #64748b;
      margin-bottom: 28px;
    }

    .form-label {
      font-weight: 700;
      color: #334155;
    }

    .form-control, .form-select {
      border-radius: 14px;
      padding: 14px 16px;
    }

    textarea.form-control {
      min-height: 220px;
      resize: vertical;
    }

    .btn {
      border-radius: 14px;
      padding: 12px 20px;
      font-weight: 700;
    }

    .primary-btn {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      border: none;
      color: white;
    }

    .outline-btn {
      border: 1px solid #cbd5e1;
      background: white;
      color: #1e293b;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="form-wrap">
    <div class="page-title">게시글 작성</div>
    <div class="page-desc">제목과 내용을 입력하고 작성자를 선택하세요.</div>

    <form method="post" action="/boards/new">
      <div class="mb-3">
        <label class="form-label">작성자</label>
        <select name="userId" class="form-select" required>
          <option value="">작성자를 선택하세요</option>
          <option th:each="user : ${users}"
                  th:value="${user.id}"
                  th:text="${user.name + ' (' + user.email + ')'}">
            사용자
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" name="title" class="form-control" placeholder="제목을 입력하세요" required>
      </div>

      <div class="mb-4">
        <label class="form-label">내용</label>
        <textarea name="content" class="form-control" placeholder="내용을 입력하세요" required></textarea>
      </div>

      <div class="d-flex justify-content-between gap-2">
        <a href="/" class="btn outline-btn">목록으로</a>
        <button type="submit" class="btn primary-btn">작성하기</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
