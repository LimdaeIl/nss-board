<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
      min-height: 100vh;
    }

    .detail-wrap {
      max-width: 880px;
      margin: 70px auto;
      background: rgba(255,255,255,0.94);
      border-radius: 28px;
      padding: 42px;
      box-shadow: 0 20px 45px rgba(31, 41, 55, 0.08);
    }

    .title {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .meta {
      color: #64748b;
      margin-bottom: 28px;
    }

    .content-box {
      background: #f8fafc;
      border-radius: 20px;
      padding: 24px;
      min-height: 240px;
      white-space: pre-wrap;
      line-height: 1.8;
      color: #334155;
      margin-bottom: 28px;
    }

    .btn {
      border-radius: 14px;
      padding: 12px 20px;
      font-weight: 700;
    }

    .primary-btn {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      border: none;
      color: white;
    }

    .outline-btn {
      border: 1px solid #cbd5e1;
      background: white;
      color: #1e293b;
    }

    .danger-btn {
      border: 1px solid #fecaca;
      background: #fff5f5;
      color: #b91c1c;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="detail-wrap">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
      <div>
        <div class="title" th:text="${board.title}">제목</div>
        <div class="meta">
          작성자: <span th:text="${board.user.name}">작성자</span>
          <span class="mx-2">|</span>
          이메일: <span th:text="${board.user.email}">email</span>
        </div>
      </div>
      <a href="/" class="btn outline-btn">목록</a>
    </div>

    <div class="content-box" th:text="${board.content}">내용</div>

    <div class="d-flex gap-2 flex-wrap">
      <a th:href="@{/boards/{id}/edit(id=${board.id})}" class="btn primary-btn">수정</a>

      <form th:action="@{/boards/{id}/delete(id=${board.id})}" method="post">
        <button type="submit" class="btn danger-btn">삭제</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
