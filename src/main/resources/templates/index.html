<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>NSS Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      margin: 0;
      background:
          radial-gradient(circle at top left, #eef4ff 0%, transparent 28%),
          radial-gradient(circle at top right, #f7f2ff 0%, transparent 24%),
          linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
      color: #1f2937;
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }

    .hero {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      padding: 42px 44px;
      box-shadow: 0 20px 45px rgba(31, 41, 55, 0.08);
      margin-bottom: 28px;
    }

    .hero-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .hero-desc {
      margin: 0;
      color: #64748b;
      font-size: 1.05rem;
    }

    .hero-actions .btn {
      border-radius: 14px;
      padding: 12px 20px;
      font-weight: 700;
    }

    .primary-btn {
      background: linear-gradient(135deg, #111827 0%, #334155 100%);
      border: none;
      color: white;
    }

    .primary-btn:hover {
      color: white;
      opacity: 0.96;
    }

    .outline-btn {
      background: white;
      border: 1px solid #cbd5e1;
      color: #1e293b;
    }

    .outline-btn:hover {
      background: #f8fafc;
      color: #0f172a;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: #334155;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .board-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      min-height: 250px;
      display: flex;
      flex-direction: column;
    }

    .board-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 40px rgba(15, 23, 42, 0.12);
    }

    .writer-badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .board-title {
      font-size: 1.25rem;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 12px;
      color: #0f172a;
    }

    .board-preview {
      color: #64748b;
      line-height: 1.7;
      flex-grow: 1;
      margin-bottom: 20px;
    }

    .empty-box {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      text-align: center;
      padding: 70px 24px;
      box-shadow: 0 20px 45px rgba(31, 41, 55, 0.08);
    }

    .empty-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .empty-desc {
      color: #64748b;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .hero {
        padding: 30px 24px;
      }

      .hero-title {
        font-size: 2.2rem;
      }

      .hero-actions {
        width: 100%;
      }

      .hero-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <section class="hero">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
      <div>
        <h1 class="hero-title">NSS Board</h1>
        <p class="hero-desc">Spring Boot와 Thymeleaf로 만든 심플한 게시판</p>
      </div>
      <div class="hero-actions d-flex gap-2 flex-wrap">
        <a href="/users/new" class="btn outline-btn">사용자 등록</a>
        <a href="/boards/new" class="btn primary-btn">게시글 작성</a>
      </div>
    </div>
  </section>

  <section th:if="${!#lists.isEmpty(boards)}">
    <div class="section-title">전체 게시글</div>
    <div class="board-grid">
      <article class="board-card" th:each="board : ${boards}">
        <div class="writer-badge">
          작성자&nbsp;<span th:text="${board.user.name}">작성자명</span>
        </div>

        <div class="board-title" th:text="${board.title}">게시글 제목</div>

        <div class="board-preview"
             th:text="${#strings.length(board.content) > 120 ? #strings.substring(board.content, 0, 120) + '...' : board.content}">
          게시글 내용 미리보기
        </div>

        <div>
          <a th:href="@{/boards/{id}(id=${board.id})}" class="btn primary-btn">상세보기</a>
        </div>
      </article>
    </div>
  </section>

  <section class="empty-box" th:if="${#lists.isEmpty(boards)}">
    <div class="empty-title">아직 게시글이 없습니다</div>
    <div class="empty-desc">첫 번째 게시글을 작성해서 화면을 채워보세요.</div>
    <a href="/boards/new" class="btn primary-btn">게시글 작성하기</a>
  </section>
</div>
</body>
</html>
